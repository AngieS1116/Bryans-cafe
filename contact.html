<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Bryan's Café</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo"><a href="about.html">Bryan's Café</a></div>
            <nav>
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="contact-header">
            <h1>Contact Us</h1>
            <p>Get in touch with us or visit one of our branches.</p>
        </div>
        <section class="section-padding container">
            <div class="contact-grid">
                <div>
                    <h2>Send Us an Enquiry</h2>
                    <br>
                    <form id="enquiry-form">
                        <div class="form-group">
                            <label for="fname">First Name *</label>
                            <input type="text" id="fname" name="fname" required>
                        </div>
                        <div class="form-group">
                            <label for="lname">Last Name *</label>
                            <input type="text" id="lname" name="lname" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Message Subject *</label>
                            <input type="text" id="subject" name="subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message Body *</label>
                            <textarea id="message" name="message" required></textarea>
                        </div>
                        <button type="submit" class="btn">Submit</button>
                    </form>
                </div>
                <div>
                    <h2>Our Branches</h2>
                    <br>
                    <div id="branches-container">
                        <!-- Branches will be loaded dynamically here via XML -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy;<span id="current-year"></span> Bryan's Café. All rights reserved.</p>
        <div class="footer-nav">
            <a href="privacy-policy.html" target="_blank">Privacy Policy</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
